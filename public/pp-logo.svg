<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="meshGold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="30%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="70%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="meshGold2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="75%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle with mesh gradient -->
  <circle cx="60" cy="60" r="56" fill="url(#meshGold1)" stroke="url(#meshGold2)" stroke-width="3"/>
  <circle cx="60" cy="60" r="56" fill="url(#meshGold2)" opacity="0.5"/>
  <!-- Accent highlights -->
  <ellipse cx="35" cy="35" rx="25" ry="20" fill="#FFFFFF" opacity="0.3"/>
  <ellipse cx="80" cy="75" rx="20" ry="18" fill="#FFD700" opacity="0.2"/>
  <!-- PP Text -->
  <text x="60" y="78" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="-2">PP</text>
</svg>
