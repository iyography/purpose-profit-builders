  <text x="58" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" letter-spacing="3" fill="url(#logoGrad)">PURPOSE &amp; PROFIT</text>
  <!-- BUILDERS text -->
