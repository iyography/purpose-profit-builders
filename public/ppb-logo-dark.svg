    <circle cx="22" cy="8" r="2" fill="#FFD700"/>
    <circle cx="2" cy="16" r="1.5" fill="#FFD700"/>
    <circle cx="42" cy="16" r="1.5" fill="#FFD700"/>
    <rect x="6" y="40" width="32" height="3" rx="1.5" fill="url(#logoGrad)" opacity="0.6"/>
  </g>
